<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #e5e5e5;
            --text: #0a0a0a;
            --text-muted: #737373;
            --text-subtle: #a3a3a3;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }

        .nav {
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            padding: 14px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .brand-mark {
            width: 22px;
            height: 22px;
            background: var(--text);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--bg);
        }

        .hero {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px 48px;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 12px;
            line-height: 1.15;
        }

        .hero p {
            font-size: 15px;
            color: var(--text-muted);
            max-width: 520px;
            margin: 0 auto;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .panel-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            padding: 3px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
        }

        iframe {
            display: block;
            width: 100%;
            border: none;
            background: var(--bg);
        }

        .footer {
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid var(--border);
            color: var(--text-subtle);
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .hero {
                padding: 48px 24px 32px;
            }
            .hero h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-inner">
            <div class="brand">
                <div class="brand-mark">J</div>
                <span>Job Application System</span>
            </div>
            <div class="nav-links">
                <a href="#form" class="nav-link">Form</a>
                <a href="#table" class="nav-link">Applicants</a>
                <a href="#plan" class="nav-link">Plan</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>Apply, review, and grow.</h1>
        <p>An integrated platform combining the application form, applicants overview, and career roadmap in a single place.</p>
    </div>

    <div class="container">

        <div class="panel" id="form">
            <div class="panel-header">
                <div class="panel-title-group">
                    <div class="panel-dot"></div>
                    <div class="panel-title">Application Form</div>
                </div>
                <div class="panel-tag">form.html</div>
            </div>
            <iframe src="form.html" width="100%" height="940"></iframe>
        </div>

        <div class="panel" id="table">
            <div class="panel-header">
                <div class="panel-title-group">
                    <div class="panel-dot"></div>
                    <div class="panel-title">Applicants Table</div>
                </div>
                <div class="panel-tag">table.html</div>
            </div>
            <iframe src="table.html" width="100%" height="420"></iframe>
        </div>

        <div class="panel" id="plan">
            <div class="panel-header">
                <div class="panel-title-group">
                    <div class="panel-dot"></div>
                    <div class="panel-title">Career Plan</div>
                </div>
                <div class="panel-tag">lists.html</div>
            </div>
            <iframe src="lists.html" width="100%" height="780"></iframe>
        </div>

    </div>

    <footer class="footer">
        Built with HTML &amp; CSS
    </footer>

</body>
</html>
