<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applicants</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #e5e5e5;
            --text: #0a0a0a;
            --text-muted: #737373;
            --text-subtle: #a3a3a3;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 60px 20px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        caption {
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        thead th[colspan="3"] {
            padding: 14px 20px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            background: #fafafa;
            border-bottom: 1px solid var(--border);
        }

        thead tr:nth-child(2) th {
            padding: 10px 20px;
            text-align: left;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 14px 20px;
            font-size: 14px;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        td[rowspan] {
            font-weight: 500;
            color: var(--text-muted);
            background: #fafafa;
            border-right: 1px solid var(--border);
            font-size: 13px;
        }

        .name {
            font-weight: 500;
        }

        .score {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        .score::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #16a34a;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>Applicants</h1>
            <p class="subtitle">Top candidates ranked by performance.</p>
        </div>

        <div class="card">
            <table>
                <caption>Applicants Overview</caption>

                <thead>
                    <tr>
                        <th colspan="3">Applicants Data</th>
                    </tr>
                    <tr>
                        <th>Category</th>
                        <th>Name</th>
                        <th>Score</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td rowspan="2">Top Candidates</td>
                        <td class="name">Ahmad</td>
                        <td><span class="score">90</span></td>
                    </tr>
                    <tr>
                        <td class="name">Lina</td>
                        <td><span class="score">85</span></td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</body>
</html>
